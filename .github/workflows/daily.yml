name: AI News Daily

on:
  schedule:
    # 06:07 UTC = 08:07 ora italiana (ora legale CEST). In ora solare diventa 07:07.
    # Pochi minuti dopo l'ora esatta: l'inizio di ogni ora e' la fascia piu'
    # congestionata su GitHub Actions, dove i cron vengono ritardati o saltati.
    - cron: "7 6 * * *"
  workflow_dispatch:   # permette il lancio manuale dal sito GitHub (per i test)

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # serve per ricommittare state/sent.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Send digest
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ai_news_digest.py

      - name: Persist sent state
        if: success()   # solo se il digest e' stato inviato davvero (no fallback)
        run: |
          if [ -n "$(git status --porcelain state/sent.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/sent.json
            git commit -m "chore: aggiorna stato news inviate [skip ci]"
            git push
          else
            echo "Nessuna modifica allo stato, niente da committare."
          fi
